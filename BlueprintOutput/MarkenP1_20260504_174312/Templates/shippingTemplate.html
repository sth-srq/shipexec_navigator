<div class="shipping-template">
    <div class="row">
        <div class="col-md-4">
            <div class="shipping-toolbar">
                <keyboard-event key="F2" on-keypress="vm.newShipment()"></keyboard-event>
                <keyboard-event key="F7" on-keypress="vm.load()"></keyboard-event>
                <keyboard-event key="F8" on-keypress="vm.repeatShipment()"></keyboard-event>
                <keyboard-event key="F9" on-keypress="vm.rate()"></keyboard-event>
                <keyboard-event key="F12" on-keypress="vm.checkShip()"></keyboard-event>

                <button type="button" class="btn btn-xs btn-primary" ng-click="vm.newShipment()">New</button>
                <button type="button" class="btn btn-xs btn-primary" ng-click="vm.repeatShipment()">Repeat</button>
                <button type="button" class="btn btn-xs btn-default" ng-click="vm.buildShipment()">Build</button>
                <button type="button" class="btn btn-xs btn-default" ng-click="vm.showDistributionList = !vm.showDistributionList">DistList</button>
                <button type="button" class="btn btn-xs btn-default" id="PickupRequestButton" ng-click="vm.openPickup()" ng-hide="(vm.currentShipment && vm.currentShipment.PackageDefaults && vm.currentShipment.PackageDefaults.Consignee && (vm.currentShipment.PackageDefaults.Consignee.Country === 'CA' || vm.currentShipment.PackageDefaults.Consignee.Country === 'Canada')) || (vm.currentShipment && vm.currentShipment.PackageDefaults && vm.currentShipment.PackageDefaults.ReturnAddress && (vm.currentShipment.PackageDefaults.ReturnAddress.Country === 'CA' || vm.currentShipment.PackageDefaults.ReturnAddress.Country === 'Canada'))">Pickup</button>
                <button type="button" class="btn btn-xs btn-default" ng-click="vm.pendingShipment()" ng-if="!vm.profile.ProfileSetting.DisablePendingShipment">Pending</button>
                <button type="button" class="btn btn-xs btn-default" ng-click="vm.mailRoom()" ng-if="vm.profile.ProfileSetting.EnableMailRoomProcessing">MailRoom</button>
            </div>

            <div class="form-horizontal">
                <field-select property="LoadFrom"
                              model="vm.loadFrom"
                              options="item.Value as item.Name for item in vm.loadFromOptions"
                              caption="Load From"
                              change-function="vm.loadFromChanged()"
                              form-type="Horizontal"></field-select>

                <field-input property="Load"
                             model="vm.loadValue"
                             caption="Load"
                             form-type="Horizontal"></field-input>

                <field-select property="Shipper"
                              model="vm.currentShipment.PackageDefaults.Shipper"
                              options="item.Value as item.Name for item in vm.profile.Shippers"
                              caption="Shipper"
                              change-function="vm.shipperChanged()"
                              form-type="Horizontal"></field-select>

                <field-date property="ShipDate"
                            model="vm.startshipdate.value"
                            caption="Ship Date"
                            is-open="vm.startshipdate.opened"
                            datepicker-options="vm.dateOptions"
                            change-function="vm.shipDateChanged()"
                            form-type="Horizontal"></field-date>

                <field-select property="Terms"
                              model="vm.currentShipment.PackageDefaults.Terms"
                              options="item.Value as item.Name for item in vm.profile.PaymentTerms"
                              caption="Terms"
                              change-function="vm.termsChanged()"
                              form-type="Horizontal"></field-select>

                <field-checkbox property="ThirdPartyBilling"
                                model="vm.currentShipment.PackageDefaults.ThirdPartyBilling"
                                caption="3rd Party"
                                change="vm.thirdPartyBillingChanged()"></field-checkbox>

                <field-checkbox property="BillConsignee"
                                model="vm.currentShipment.PackageDefaults.BillConsignee"
                                caption="Bill Consignee"
                                change="vm.billConsigneeChanged()"></field-checkbox>

                <field-checkbox property="Brokerage"
                                model="vm.currentShipment.PackageDefaults.Brokerage"
                                caption="Brokerage"
                                change="vm.brokerageChanged()"></field-checkbox>
            </div>
        </div>

        <div class="col-md-8">
            <ul class="nav nav-tabs">
                <li ng-class="{active: vm.addressTabIndex === 0}"><a href="" ng-click="vm.addressTabIndex = 0">Pickup From</a></li>
                <li ng-class="{active: vm.addressTabIndex === 1}" ng-if="vm.showDistributionList"><a href="" ng-click="vm.addressTabIndex = 1">Distribution List</a></li>
                <li ng-class="{active: vm.addressTabIndex === 2}" ng-if="!vm.profile.FieldOptions.ReturnAddress.IsHidden"><a href="" ng-click="vm.addressTabIndex = 2">Return Address</a></li>
                <li ng-class="{active: vm.addressTabIndex === 3}" ng-if="!vm.profile.FieldOptions.OriginAddress.IsHidden"><a href="" ng-click="vm.addressTabIndex = 3">Origin</a></li>
                <li ng-class="{active: vm.addressTabIndex === 4}" ng-if="vm.currentShipment.PackageDefaults.ThirdPartyBilling"><a href="" ng-click="vm.addressTabIndex = 4">Third Party Billing</a></li>
                <li ng-class="{active: vm.addressTabIndex === 5}" ng-if="vm.currentShipment.PackageDefaults.ConsigneeThirdPartyBilling"><a href="" ng-click="vm.addressTabIndex = 5">Consignee Third Party</a></li>
                <li ng-class="{active: vm.addressTabIndex === 6}" ng-if="vm.currentShipment.PackageDefaults.BrokerageThirdPartyBilling"><a href="" ng-click="vm.addressTabIndex = 6">Brokerage Third Party</a></li>
            </ul>

            <div class="tab-content">
                <div class="tab-pane" ng-class="{active: vm.addressTabIndex === 0}">
                    <name-address caption="Pickup From"
                                  nameaddress="vm.currentShipment.PackageDefaults.Consignee"
                                  countries="vm.profile.Countries"
                                  translations="vm.translations"
                                  field-options="vm.profile.FieldOptions"
                                  address-property-name="Consignee"
                                  current-shipment="vm.currentShipment"
                                  hide-address-book-list="false"
                                  hide-checkboxes="false"
                                  hide-validate="false"
                                  hide-search="false"
                                  active-subtab-index="1"
                                  is-update-address-book-entry="vm.isUpdateAddressBookEntry"
                                  address-book-id="vm.addressBookId"
                                  disable-Fields="false"></name-address>
                </div>
                <div class="tab-pane" ng-class="{active: vm.addressTabIndex === 1}" ng-if="vm.showDistributionList">
                    <div distribution-list-template></div>
                </div>
                <div class="tab-pane" ng-class="{active: vm.addressTabIndex === 2}" ng-if="!vm.profile.FieldOptions.ReturnAddress.IsHidden">
                    <name-address caption="Return Address"
                                  nameaddress="vm.currentShipment.PackageDefaults.ReturnAddress"
                                  countries="vm.profile.Countries"
                                  translations="vm.translations"
                                  field-options="vm.profile.FieldOptions"
                                  address-property-name="ReturnAddress"
                                  current-shipment="vm.currentShipment"
                                  hide-address-book-list="false"
                                  hide-checkboxes="false"
                                  hide-validate="false"
                                  hide-search="false"
                                  active-subtab-index="1"
                                  is-update-address-book-entry="vm.isUpdateAddressBookEntry"
                                  address-book-id="vm.addressBookId"
                                  disable-Fields="false"></name-address>
                </div>
                <div class="tab-pane" ng-class="{active: vm.addressTabIndex === 3}" ng-if="!vm.profile.FieldOptions.OriginAddress.IsHidden">
                    <name-address caption="Origin"
                                  nameaddress="vm.currentShipment.PackageDefaults.OriginAddress"
                                  countries="vm.profile.Countries"
                                  translations="vm.translations"
                                  field-options="vm.profile.FieldOptions"
                                  address-property-name="OriginAddress"
                                  current-shipment="vm.currentShipment"
                                  hide-address-book-list="false"
                                  hide-checkboxes="false"
                                  hide-validate="false"
                                  hide-search="false"
                                  active-subtab-index="1"
                                  is-update-address-book-entry="vm.isUpdateAddressBookEntry"
                                  address-book-id="vm.addressBookId"
                                  disable-Fields="false"></name-address>
                </div>
            </div>

            <div class="shipping-tabs-right">
                <ul class="nav nav-tabs">
                    <li ng-class="{active: vm.packageTabIndex === 0}"><a href="" ng-click="vm.packageTabIndex = 0">General</a></li>
                    <li ng-class="{active: vm.packageTabIndex === 1}"><a href="" ng-click="vm.packageTabIndex = 1">Accessorials</a></li>
                    <li ng-class="{active: vm.packageTabIndex === 2}"><a href="" ng-click="vm.packageTabIndex = 2">Intl</a></li>
                    <li ng-class="{active: vm.packageTabIndex === 3}"><a href="" ng-click="vm.packageTabIndex = 3">Hazmat</a></li>
                    <li ng-class="{active: vm.packageTabIndex === 4}"><a href="" ng-click="vm.packageTabIndex = 4">Reference</a></li>
                    <li ng-class="{active: vm.packageTabIndex === 5}"><a href="" ng-click="vm.packageTabIndex = 5">LTL</a></li>
                    <li ng-class="{active: vm.packageTabIndex === 6}"><a href="" ng-click="vm.packageTabIndex = 6">Visibility</a></li>
                    <li ng-class="{active: vm.packageTabIndex === 7}"><a href="" ng-click="vm.packageTabIndex = 7">Goods</a></li>
                </ul>

                <div class="tab-content">
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 0}">
                        <general-tab></general-tab>
                    </div>
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 1}">
                        <accessorial-tab></accessorial-tab>
                    </div>
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 2}">
                        <international-tab></international-tab>
                    </div>
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 3}">
                        <hazmat-tab></hazmat-tab>
                    </div>
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 4}">
                        <reference-tab></reference-tab>
                        <field-select property="ConsigneeReference"
                                      model="vm.currentShipment.PackageDefaults.ConsigneeReference"
                                      options="item.Value as item.Name for item in vm.temperatureOptions"
                                      caption="Temperature"
                                      change-function="vm.temperatureChanged()"
                                      form-type="Horizontal"></field-select>
                        <field-input property="ShipperReference"
                                     model="vm.currentShipment.PackageDefaults.ShipperReference"
                                     caption="Study Reference Guide/Code"
                                     form-type="Horizontal"></field-input>
                        <field-input property="MiscReference1"
                                     model="vm.currentShipment.PackageDefaults.MiscReference1"
                                     caption="Protocol Number"
                                     form-type="Horizontal"></field-input>
                        <field-input property="MiscReference2"
                                     model="vm.currentShipment.PackageDefaults.MiscReference2"
                                     caption="Site Number"
                                     form-type="Horizontal"></field-input>
                        <field-input property="MiscReference3"
                                     model="vm.currentShipment.PackageDefaults.MiscReference3"
                                     caption="Dry Ice Weight (kg)"
                                     form-type="Horizontal"
                                     ng-show="vm.currentShipment.PackageDefaults.ConsigneeReference === 'Frozen'"></field-input>
                        <field-checkbox property="MiscReference4"
                                        model="vm.currentShipment.PackageDefaults.MiscReference4"
                                        caption="Biological Sample"
                                        change="vm.biologicalSampleChanged()"></field-checkbox>
                    </div>
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 5}">
                        <ltl-tab></ltl-tab>
                    </div>
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 6}">
                        <visibility-tab></visibility-tab>
                    </div>
                    <div class="tab-pane" ng-class="{active: vm.packageTabIndex === 7}">
                        <goods-tab></goods-tab>
                    </div>
                </div>
            </div>

            <div class="shipping-actions text-right">
                <button type="button" class="btn btn-sm btn-default" ng-click="vm.saveShipment()" ng-if="!vm.profile.ProfileSetting.DisablePendingShipment">Save</button>
                <button type="button" class="btn btn-sm btn-primary" ng-click="vm.checkShip()" ng-if="!vm.profile.ProfileSetting.DisableShip">Ship</button>
            </div>
        </div>
    </div>
</div>
