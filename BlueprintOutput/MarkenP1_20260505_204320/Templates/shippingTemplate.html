<div class="shipping-template">
  <div class="row">
    <div class="col-md-4">
      <div class="shipping-toolbar">
        <keyboard-event key="F2" on-keypress="vm.newShipment()"></keyboard-event>
        <keyboard-event key="F7" on-keypress="vm.load()"></keyboard-event>
        <keyboard-event key="F8" on-keypress="vm.repeatShipment()"></keyboard-event>
        <keyboard-event key="F9" on-keypress="vm.rate()"></keyboard-event>
        <keyboard-event key="F12" on-keypress="vm.checkShip()"></keyboard-event>

        <button type="button" class="btn btn-default" ng-click="vm.newShipment()">New (F2)</button>
        <button type="button" class="btn btn-default" ng-click="vm.repeatShipment()">Repeat (F8)</button>
        <button type="button" class="btn btn-default" ng-click="vm.build()">Build</button>
        <button type="button" class="btn btn-default" ng-click="vm.showDistributionList = !vm.showDistributionList">DistList</button>
        <button type="button" class="btn btn-default" ng-click="vm.pickup()">Pickup</button>
        <button type="button" class="btn btn-default" ng-click="vm.pendingShipment()" ng-hide="vm.profile.ProfileSetting.DisablePendingShipment">Pending</button>
        <button type="button" class="btn btn-default" ng-click="vm.mailRoom()" ng-show="vm.profile.ProfileSetting.EnableMailRoomProcessing">MailRoom</button>
      </div>

      <div class="shipping-left-panel">
        <field-select property="LoadFrom"
                      model="vm.loadFrom"
                      options="item.Value as item.Name for item in vm.loadFromOptions"
                      caption="Load From"
                      change-function="vm.onLoadFromChanged()"
                      form-type="Horizontal">
        </field-select>

        <field-input property="Load"
                     model="vm.loadValue"
                     caption="Load"
                     form-type="Horizontal">
        </field-input>

        <field-select property="Shipper"
                      model="vm.currentShipment.PackageDefaults.Shipper"
                      options="item.Symbol as item.Name for item in vm.profile.Shippers"
                      caption="Shipper"
                      change-function="vm.onShipperChanged()"
                      form-type="Horizontal">
        </field-select>

        <field-date property="ShipDate"
                    model="vm.startshipdate.value"
                    caption="Ship Date"
                    is-open="vm.startshipdate.opened"
                    datepicker-options="vm.dateOptions"
                    change-function="vm.onShipDateChanged()"
                    form-type="Horizontal">
        </field-date>

        <field-select property="Terms"
                      model="vm.currentShipment.PackageDefaults.Terms"
                      options="item.Symbol as item.Name for item in vm.profile.PaymentTerms"
                      caption="Terms"
                      change-function="vm.onTermsChanged()"
                      form-type="Horizontal">
        </field-select>

        <field-checkbox property="ThirdPartyBilling"
                        model="vm.currentShipment.PackageDefaults.ThirdPartyBilling"
                        caption="3rd Party"
                        change="vm.onThirdPartyBillingChanged()">
        </field-checkbox>

        <field-checkbox property="ConsigneeThirdPartyBilling"
                        model="vm.currentShipment.PackageDefaults.ConsigneeThirdPartyBilling"
                        caption="Bill Consignee"
                        change="vm.onConsigneeThirdPartyBillingChanged()">
        </field-checkbox>

        <field-checkbox property="BrokerageThirdPartyBilling"
                        model="vm.currentShipment.PackageDefaults.BrokerageThirdPartyBilling"
                        caption="Brokerage"
                        change="vm.onBrokerageThirdPartyBillingChanged()"
                        ng-hide="vm.profile.FieldOptions.BrokerageThirdPartyBilling.IsHidden">
        </field-checkbox>

        <field-checkbox property="MiscReference4"
                        model="vm.currentShipment.PackageDefaults.MiscReference4"
                        caption="Biological Sample"
                        change="vm.onBiologicalSampleChanged()">
        </field-checkbox>

        <div class="address-tabs">
          <ul class="nav nav-tabs">
            <li class="active"><a href="javascript:void(0)">Pickup From</a></li>
            <li ng-show="vm.showDistributionList"><a href="javascript:void(0)">Distribution List</a></li>
            <li ng-hide="vm.profile.FieldOptions.ReturnAddress.IsHidden"><a href="javascript:void(0)">Return Address</a></li>
            <li ng-hide="vm.profile.FieldOptions.OriginAddress.IsHidden"><a href="javascript:void(0)">Origin</a></li>
            <li ng-show="vm.currentShipment.PackageDefaults.ThirdPartyBilling"><a href="javascript:void(0)">3rd Party Addr</a></li>
            <li ng-show="vm.currentShipment.PackageDefaults.ConsigneeThirdPartyBilling"><a href="javascript:void(0)">Consignee 3rd</a></li>
            <li ng-show="vm.currentShipment.PackageDefaults.BrokerageThirdPartyBilling"><a href="javascript:void(0)">Brokerage Addr</a></li>
          </ul>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="shipping-right-panel">
        <ul class="nav nav-tabs">
          <li class="active"><a href="javascript:void(0)">General</a></li>
          <li><a href="javascript:void(0)">Accessorials</a></li>
          <li><a href="javascript:void(0)">Intl</a></li>
          <li><a href="javascript:void(0)">Hazmat</a></li>
          <li><a href="javascript:void(0)">Reference</a></li>
          <li><a href="javascript:void(0)">LTL</a></li>
          <li><a href="javascript:void(0)">Visibility</a></li>
          <li><a href="javascript:void(0)">Goods</a></li>
        </ul>

        <div class="tab-content">
          <div class="tab-pane active">
            <general-tab></general-tab>
            <accessorial-tab></accessorial-tab>
            <international-tab></international-tab>
            <hazmat-tab></hazmat-tab>
            <reference-tab></reference-tab>
            <ltl-tab></ltl-tab>
            <visibility-tab></visibility-tab>
            <goods-tab></goods-tab>
          </div>
        </div>
      </div>

      <div class="shipping-actions text-right">
        <button type="button" class="btn btn-primary" ng-click="vm.saveShipment()" ng-hide="vm.profile.ProfileSetting.DisablePendingShipment">Save</button>
        <button type="button" class="btn btn-default" ng-click="vm.rate()" ng-hide="true">Rate</button>
        <button type="button" class="btn btn-success" ng-click="vm.checkShip()" ng-hide="vm.profile.ProfileSetting.DisableShip">Ship</button>
      </div>
    </div>
  </div>
</div>
