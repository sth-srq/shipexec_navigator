<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log Viewer</title>
<style>
/* ── Reset / Base ─────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    font-size: 14px;
    background: #f0f2f5;
    color: #212529;
}

/* ── App shell ────────────────────────────────────────────────────────── */
.app { display: flex; flex-direction: column; height: 100vh; }

.app-header {
    background: #2e6da4;
    color: #fff;
    padding: 0.7rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
.app-header h1 { font-size: 1.05rem; font-weight: 600; }
.app-header p  { font-size: 0.78rem; opacity: 0.75; }

.app-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.85rem;
    padding: 1rem 1.25rem;
    min-height: 0;
}

/* ── Paste panel ──────────────────────────────────────────────────────── */
.paste-panel {
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    padding: 1.1rem 1.25rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    flex-shrink: 0;
}
.paste-panel h2 { font-size: 0.85rem; font-weight: 600; color: #495057; margin-bottom: 0.65rem; }
.paste-area {
    width: 100%;
    height: 120px;
    resize: vertical;
    border: 1px dashed #ced4da;
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    font-size: 0.78rem;
    font-family: "Cascadia Code", "Consolas", monospace;
    background: #fafbfc;
    color: #212529;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
}
.paste-area:focus { border-color: #2e6da4; box-shadow: 0 0 0 3px rgba(46,109,164,0.2); }
.paste-area::placeholder { color: #adb5bd; }
.paste-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.65rem;
    flex-wrap: wrap;
}
.paste-hint { font-size: 0.73rem; color: #868e96; margin-left: auto; }

/* ── Error banner ─────────────────────────────────────────────────────── */
.error-banner {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    background: #fff5f5;
    border: 1px solid #fca5a5;
    border-radius: 6px;
    color: #c53030;
    padding: 0.55rem 1rem;
    font-size: 0.85rem;
    flex-shrink: 0;
}

/* ── Buttons ──────────────────────────────────────────────────────────── */
.btn {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    border-radius: 6px;
    padding: 0.38rem 0.95rem;
    font-size: 0.83rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    white-space: nowrap;
    transition: background-color 0.13s, border-color 0.13s, color 0.13s;
    line-height: 1.4;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary  { background: #2e6da4; border-color: #2e6da4; color: #fff; }
.btn-primary:hover:not(:disabled) { background: #255d8e; border-color: #255d8e; }
.btn-ghost    { background: #fff; border-color: #ced4da; color: #495057; }
.btn-ghost:hover:not(:disabled) { background: #e9ecef; border-color: #adb5bd; }
.btn-export   { background: rgba(46,109,164,0.08); border-color: #2e6da4; color: #2e6da4; }
.btn-export:hover:not(:disabled) { background: rgba(46,109,164,0.16); }
.btn-sm { padding: 0.24rem 0.6rem; font-size: 0.76rem; }

/* ── Results panel ────────────────────────────────────────────────────── */
.results-panel {
    background: #fff;
    border: 1px solid #dee2e6;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    overflow: hidden;
}

/* ── Results toolbar ──────────────────────────────────────────────────── */
.results-toolbar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid #dee2e6;
    background: #f8f9fa;
    border-radius: 8px 8px 0 0;
    flex-shrink: 0;
    flex-wrap: wrap;
}
.format-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    background: rgba(46,109,164,0.1);
    border: 1px solid rgba(46,109,164,0.25);
    color: #2e6da4;
    border-radius: 2rem;
    padding: 0.13rem 0.6rem;
    font-size: 0.73rem;
    font-weight: 600;
    white-space: nowrap;
}
.search-wrap {
    display: flex;
    align-items: center;
    gap: 0.35rem;
}
.search-icon { font-size: 0.82rem; color: #868e96; }
.search-input {
    border: 1px solid #ced4da;
    border-radius: 6px;
    padding: 0.28rem 0.6rem;
    font-size: 0.82rem;
    outline: none;
    width: 200px;
    transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input:focus { border-color: #2e6da4; box-shadow: 0 0 0 3px rgba(46,109,164,0.2); }
.row-count { font-size: 0.76rem; color: #868e96; white-space: nowrap; }
.row-count strong { color: #495057; }
.toolbar-right { display: flex; align-items: center; gap: 0.4rem; margin-left: auto; }

/* ── Table wrap ───────────────────────────────────────────────────────── */
.table-wrap { overflow: auto; flex: 1; }
.table-wrap::-webkit-scrollbar { width: 8px; height: 8px; }
.table-wrap::-webkit-scrollbar-track { background: #f5f7fa; }
.table-wrap::-webkit-scrollbar-thumb { background: #ced4da; border-radius: 4px; }
.table-wrap::-webkit-scrollbar-thumb:hover { background: #adb5bd; }

/* ── Log table ────────────────────────────────────────────────────────── */
.log-table { width: 100%; border-collapse: collapse; font-size: 0.79rem; }

/* Sticky thead as a unit */
.log-table thead { position: sticky; top: 0; z-index: 3; }

/* Header row */
.log-table thead .header-row th {
    background: #f0f2f5;
    color: #495057;
    font-weight: 600;
    text-align: left;
    border-bottom: 2px solid #dee2e6;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
}
.log-table thead .header-row th:hover { background: #e2e6ea; }
.th-inner {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.48rem 0.7rem;
}
.sort-icon { font-size: 0.62rem; opacity: 0.3; transition: opacity 0.1s; }
.sort-icon.asc  { opacity: 1; color: #2e6da4; }
.sort-icon.desc { opacity: 1; color: #2e6da4; }

/* Filter row */
.log-table thead .filter-row th {
    background: #fafbfc;
    border-bottom: 1px solid #dee2e6;
    padding: 0.28rem 0.4rem;
}
.filter-input {
    width: 100%;
    border: 1px solid #e2e6ea;
    border-radius: 4px;
    padding: 0.18rem 0.4rem;
    font-size: 0.73rem;
    outline: none;
    color: #212529;
    background: #fff;
    transition: border-color 0.12s;
}
.filter-input:focus { border-color: #2e6da4; }

/* Body */
.log-table tbody tr { transition: background-color 0.08s; }
.log-table tbody tr:nth-child(even) { background: #f8f9fa; }
.log-table tbody tr:hover { background: rgba(46,109,164,0.06) !important; }
.log-table tbody td {
    padding: 0.32rem 0.7rem;
    border-bottom: 1px solid #f0f2f5;
    vertical-align: top;
}

/* Source row tints */
.row-app      { background: rgba(59,130,246,0.03) !important; }
.row-security { background: rgba(249,115,22,0.04) !important; }
.row-app td:first-child      { border-left: 3px solid #3b82f6; }
.row-security td:first-child { border-left: 3px solid #f97316; }

/* ── Badges ───────────────────────────────────────────────────────────── */
.badge {
    display: inline-block;
    font-size: 0.67rem;
    font-weight: 700;
    padding: 0.1rem 0.42rem;
    border-radius: 3px;
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}
.badge-src-app      { background: #dbeafe; color: #1d4ed8; }
.badge-src-security { background: #ffedd5; color: #c2410c; }
.badge-trace    { background: #f0f2f5; color: #868e96; }
.badge-debug    { background: #e8f4f8; color: #0c7490; }
.badge-info     { background: #d1fae5; color: #065f46; }
.badge-warn,
.badge-warning  { background: #fef9c3; color: #854d0e; }
.badge-error    { background: #fee2e2; color: #b91c1c; }
.badge-fatal,
.badge-critical { background: #3b0764; color: #e9d5ff; }

/* ── Cell helpers ─────────────────────────────────────────────────────── */
.cell-date   { white-space: nowrap; font-family: "Cascadia Code","Consolas",monospace; color: #6c757d; font-size: 0.73rem; }
.cell-logger { color: #2e6da4; white-space: nowrap; }
.cell-server { color: #6c757d; white-space: nowrap; font-size: 0.76rem; }
.cell-txid   { font-family: "Cascadia Code","Consolas",monospace; color: #6c757d; font-size: 0.7rem; white-space: nowrap; }
.cell-msg    { max-width: 400px; word-break: break-word; }
.cell-value  { max-width: 200px; word-break: break-word; color: #495057; }

/* ── Empty state ──────────────────────────────────────────────────────── */
.empty-state {
    padding: 3rem;
    text-align: center;
    color: #868e96;
    font-size: 0.875rem;
}
.empty-icon { font-size: 2rem; display: block; margin-bottom: 0.6rem; }

/* ── Utility ──────────────────────────────────────────────────────────── */
.hidden { display: none !important; }
</style>
</head>

<body>
<div class="app">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <header class="app-header">
    <span style="font-size:1.5rem">📋</span>
    <div>
      <h1>Log Viewer</h1>
      <p>A self-contained offline log viewer. Paste exported CSV log data to explore,
sort, and filter Application, Security, or Combined log exports.
Supports per-column filtering, global search, and re-export of visible rows.</p>
    </div>
  </header>

  <div class="app-body">

    <!-- ── Paste panel ─────────────────────────────────────────────── -->
    <div class="paste-panel" id="pastePanel">
      <h2>📥 Paste Log Data</h2>
      <textarea id="csvInput" class="paste-area"
        placeholder="Paste CSV log data here — Application, Security, or Both format are all supported.&#10;&#10;Tip: use the ⬇ Export CSV button in the app, then paste the result here.&#10;Keyboard shortcut: Ctrl + Enter to load."></textarea>
      <div class="paste-actions">
        <button class="btn btn-primary" onclick="loadData()">⚡ Load Data</button>
        <button class="btn btn-ghost"   onclick="clearAll()">✕ Clear</button>
        <span class="paste-hint" id="pasteHint">Ctrl+Enter to load</span>
      </div>
    </div>

    <!-- ── Error banner ────────────────────────────────────────────── -->
    <div id="errorBanner" class="error-banner hidden">
      <span>⚠</span><span id="errorText"></span>
    </div>

    <!-- ── Results panel ───────────────────────────────────────────── -->
    <div class="results-panel hidden" id="resultsPanel">

      <div class="results-toolbar">
        <span class="format-badge" id="formatBadge"></span>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="globalSearch" class="search-input" type="text"
                 placeholder="Search all columns…" oninput="applyFilters()">
        </div>
        <span class="row-count" id="rowCount"></span>
        <div class="toolbar-right">
          <button class="btn btn-ghost btn-sm"   onclick="clearFilters()" title="Clear all filters">✕ Filters</button>
          <button class="btn btn-export btn-sm"  onclick="exportVisible()">⬇ Export Visible</button>
          <button class="btn btn-ghost btn-sm"   onclick="showPaste()">← New Data</button>
        </div>
      </div>

      <div class="table-wrap" id="tableWrap">
        <table class="log-table" id="logTable">
          <thead>
            <tr class="header-row" id="headerRow"></tr>
            <tr class="filter-row" id="filterRow"></tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
var G = {
  headers:    [],
  rows:       [],
  filtered:   [],
  sortCol:    -1,
  sortDir:    1,      // 1 = asc, -1 = desc
  colFilters: [],
  format:     ''
};

// ═══════════════════════════════════════════════════════════════════════════
// CSV PARSER  – RFC 4180 compliant
// ═══════════════════════════════════════════════════════════════════════════
function parseCsv(str) {
  str = str.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  if (str[str.length - 1] !== '\n') str += '\n';

  var rows = [], row = [], field = '', inQ = false;

  for (var i = 0; i < str.length; i++) {
    var c = str[i], n = str[i + 1];

    if (inQ) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"')         { inQ = false; }
      else                        { field += c; }
    } else {
      if      (c === '"')  { inQ = true; }
      else if (c === ',')  { row.push(field); field = ''; }
      else if (c === '\n') {
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else {
        field += c;
      }
    }
  }
  return rows;
}

// ═══════════════════════════════════════════════════════════════════════════
// FORMAT DETECTION
// ═══════════════════════════════════════════════════════════════════════════
function detectFormat(headers) {
  var h = headers.map(function(x){ return x.toLowerCase(); });
  if (h.indexOf('source') >= 0)  return 'both';
  if (h.indexOf('user') >= 0 ||
      h.indexOf('action') >= 0 ||
      h.indexOf('entity') >= 0)  return 'security';
  return 'application';
}

var FORMAT_LABELS = {
  application: '📋 Application Logs',
  security:    '🔒 Security Logs',
  both:        '🔍 Combined Logs'
};

// ═══════════════════════════════════════════════════════════════════════════
// LOAD
// ═══════════════════════════════════════════════════════════════════════════
function loadData() {
  var raw = document.getElementById('csvInput').value.trim();
  if (!raw) { showError('Please paste some CSV data first.'); return; }
  clearError();

  var parsed;
  try { parsed = parseCsv(raw); }
  catch(e) { showError('Failed to parse CSV: ' + e.message); return; }

  if (parsed.length < 2) {
    showError('Need at least a header row and one data row.');
    return;
  }

  G.headers    = parsed[0];
  G.rows       = parsed.slice(1);
  G.sortCol    = -1;
  G.sortDir    = 1;
  G.colFilters = G.headers.map(function(){ return ''; });
  G.format     = detectFormat(G.headers);

  buildTable();
  applyFilters();

  document.getElementById('pastePanel').classList.add('hidden');
  document.getElementById('resultsPanel').classList.remove('hidden');
}

function clearAll() {
  document.getElementById('csvInput').value = '';
  clearError();
  document.getElementById('pastePanel').classList.remove('hidden');
  document.getElementById('resultsPanel').classList.add('hidden');
  G = { headers:[], rows:[], filtered:[], sortCol:-1, sortDir:1, colFilters:[], format:'' };
}

function showPaste() {
  document.getElementById('pastePanel').classList.remove('hidden');
  document.getElementById('resultsPanel').classList.add('hidden');
}

// ═══════════════════════════════════════════════════════════════════════════
// BUILD TABLE STRUCTURE
// ═══════════════════════════════════════════════════════════════════════════
function buildTable() {
  document.getElementById('formatBadge').textContent =
    FORMAT_LABELS[G.format] || G.format;

  // ── Header row ────────────────────────────────────────────────────────
  var headerRow = document.getElementById('headerRow');
  headerRow.innerHTML = '';
  G.headers.forEach(function(h, i) {
    var th = document.createElement('th');
    th.dataset.col = i;
    th.innerHTML =
      '<div class="th-inner">' +
        escHtml(h) +
        '<span class="sort-icon" id="sort-' + i + '">&#x2195;</span>' +
      '</div>';
    th.addEventListener('click', function(){ sortBy(i); });
    headerRow.appendChild(th);
  });

  // ── Filter row ────────────────────────────────────────────────────────
  var filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = '';
  G.headers.forEach(function(h, i) {
    var th  = document.createElement('th');
    var inp = document.createElement('input');
    inp.type        = 'text';
    inp.className   = 'filter-input';
    inp.placeholder = '🔍';
    inp.title       = 'Filter: ' + h;
    inp.dataset.col = i;
    inp.addEventListener('input', (function(ci){ return function(e){
      G.colFilters[ci] = e.target.value;
      applyFilters();
    }; })(i));
    th.appendChild(inp);
    filterRow.appendChild(th);
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// FILTER
// ═══════════════════════════════════════════════════════════════════════════
function applyFilters() {
  var global = (document.getElementById('globalSearch').value || '').toLowerCase();
  var colF   = G.colFilters.map(function(f){ return f.toLowerCase(); });

  G.filtered = [];
  G.rows.forEach(function(row, idx) {
    if (global && !row.some(function(c){ return c.toLowerCase().indexOf(global) >= 0; }))
      return;
    for (var ci = 0; ci < colF.length; ci++) {
      if (colF[ci] && (row[ci] || '').toLowerCase().indexOf(colF[ci]) < 0)
        return;
    }
    G.filtered.push(idx);
  });

  if (G.sortCol >= 0) execSort();
  updateRowCount();
  renderRows();
}

function clearFilters() {
  document.getElementById('globalSearch').value = '';
  G.colFilters = G.headers.map(function(){ return ''; });
  document.querySelectorAll('.filter-input').forEach(function(inp){ inp.value = ''; });
  applyFilters();
}

// ═══════════════════════════════════════════════════════════════════════════
// SORT
// ═══════════════════════════════════════════════════════════════════════════
function sortBy(col) {
  G.sortDir = (G.sortCol === col) ? G.sortDir * -1 : 1;
  G.sortCol = col;

  // Update arrow icons
  document.querySelectorAll('.sort-icon').forEach(function(el){
    el.className = 'sort-icon';
    el.innerHTML = '&#x2195;';
  });
  var arrow = document.getElementById('sort-' + col);
  if (arrow) {
    if (G.sortDir === 1) {
      arrow.className = 'sort-icon asc';
      arrow.innerHTML = '&#x2191;';
    } else {
      arrow.className = 'sort-icon desc';
      arrow.innerHTML = '&#x2193;';
    }
  }

  execSort();
  renderRows();
}

function execSort() {
  var col = G.sortCol, dir = G.sortDir;
  G.filtered.sort(function(a, b) {
    var va = (G.rows[a][col] || '').toLowerCase();
    var vb = (G.rows[b][col] || '').toLowerCase();
    // Date/numeric comparison for datetime and numeric-looking fields
    var da = Date.parse(va), db = Date.parse(vb);
    if (!isNaN(da) && !isNaN(db)) return (da - db) * dir;
    var na = parseFloat(va), nb = parseFloat(vb);
    if (!isNaN(na) && !isNaN(nb)) return (na - nb) * dir;
    if (va < vb) return -dir;
    if (va > vb) return  dir;
    return 0;
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER ROWS
// ═══════════════════════════════════════════════════════════════════════════
function renderRows() {
  var tbody   = document.getElementById('tableBody');
  var hdrs    = G.headers.map(function(h){ return h.toLowerCase(); });
  var srcIdx  = hdrs.indexOf('source');

  if (G.filtered.length === 0) {
    tbody.innerHTML =
      '<tr><td colspan="' + G.headers.length + '" class="empty-state">' +
      '<span class="empty-icon">🔍</span>No records match the current filters.</td></tr>';
    return;
  }

  var frag = document.createDocumentFragment();

  G.filtered.forEach(function(idx) {
    var row = G.rows[idx];
    var tr  = document.createElement('tr');

    // Source tinting for "both" mode
    if (G.format === 'both' && srcIdx >= 0) {
      var src = (row[srcIdx] || '').toLowerCase();
      if (src === 'app')      tr.className = 'row-app';
      if (src === 'security') tr.className = 'row-security';
    }

    row.forEach(function(cell, ci) {
      var td     = document.createElement('td');
      td.className = cellClass(hdrs[ci]);
      td.innerHTML = formatCell(cell, hdrs[ci]);
      tr.appendChild(td);
    });

    frag.appendChild(tr);
  });

  tbody.innerHTML = '';
  tbody.appendChild(frag);
}

function formatCell(val, header) {
  if (val === null || val === undefined || val === '') return '';

  // Source badge
  if (header === 'source') {
    var sc = val.toLowerCase() === 'security' ? 'badge-src-security' : 'badge-src-app';
    return '<span class="badge ' + sc + '">' + escHtml(val) + '</span>';
  }
  // Level badge
  if (header === 'level') {
    var lc = 'badge-' + val.toLowerCase();
    return '<span class="badge ' + lc + '">' + escHtml(val) + '</span>';
  }
  return escHtml(val);
}

function cellClass(header) {
  if (header === 'date/time')                       return 'cell-date';
  if (header === 'logger' ||
      header === 'logger / user' ||
      header === 'logger/user')                     return 'cell-logger';
  if (header === 'server')                          return 'cell-server';
  if (header === 'transaction id')                  return 'cell-txid';
  if (header === 'message')                         return 'cell-msg';
  if (header === 'current value' ||
      header === 'previous value')                  return 'cell-value';
  return '';
}

// ═══════════════════════════════════════════════════════════════════════════
// EXPORT VISIBLE
// ═══════════════════════════════════════════════════════════════════════════
function exportVisible() {
  var lines = [];
  lines.push(G.headers.map(escapeCsv).join(','));
  G.filtered.forEach(function(idx){
    lines.push(G.rows[idx].map(escapeCsv).join(','));
  });
  var csv  = lines.join('\r\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href   = url;
  a.download = 'logs_filtered_' + isoDate() + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function escapeCsv(val) {
  if (val == null) return '';
  val = String(val);
  if (val.indexOf(',') >= 0 || val.indexOf('"') >= 0 ||
      val.indexOf('\n') >= 0 || val.indexOf('\r') >= 0)
    return '"' + val.replace(/"/g, '""') + '"';
  return val;
}

// ═══════════════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function updateRowCount() {
  document.getElementById('rowCount').innerHTML =
    '<strong>' + G.filtered.length + '</strong> of <strong>' +
    G.rows.length + '</strong> records';
}

function showError(msg) {
  document.getElementById('errorText').textContent = msg;
  document.getElementById('errorBanner').classList.remove('hidden');
}

function clearError() {
  document.getElementById('errorBanner').classList.add('hidden');
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function isoDate() {
  return new Date().toISOString().slice(0, 10);
}

// ── Keyboard shortcut ─────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey && e.key === 'Enter') loadData();
});
</script>
